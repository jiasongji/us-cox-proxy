# ============================================
# US-COX VPS 深度优化
# 环境: Alpine 3.19 / LXC(Incus) / 1CPU / 200MB RAM
# 场景: NAT共享宿主, 仅2个可用端口(25022-25023)
# ============================================

# === TCP 拥塞控制 (BBR 已是最佳) ===
net.ipv4.tcp_congestion_control = bbr

# === TCP Fast Open ===
net.ipv4.tcp_fastopen = 3

# === TCP 连接优化 ===
# 针对 NAT 多用户共享宿主机优化
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_max_tw_buckets = 2000
# Keepalive 快速回收僵尸连接（共享环境下很重要）
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 3
# 禁用慢启动重启
net.ipv4.tcp_slow_start_after_idle = 0
# SYN 防护 + 减少重试（降低半连接占用）
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 512
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2
# MTU 探测
net.ipv4.tcp_mtu_probing = 1
# 基础 TCP 优化
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_dsack = 1
# 减少最后一次重试等待
net.ipv4.tcp_retries2 = 8
# 快速打开回落
net.ipv4.tcp_early_retrans = 3

# === 缓冲区（200MB RAM 精打细算）===
# 缩小缓冲区上限到 4MB，减少内存压力
net.core.optmem_max = 32768
net.ipv4.tcp_rmem = 4096 32768 4194304
net.ipv4.tcp_wmem = 4096 16384 4194304
net.ipv4.udp_rmem_min = 2048
net.ipv4.udp_wmem_min = 2048

# === 端口范围（仅开放 25022-25023，但本地端口范围可大）===
net.ipv4.ip_local_port_range = 1024 65535

# === 连接队列 ===
net.core.somaxconn = 2048

# === NAT 环境优化 ===
# conntrack 超时优化（降低 conntrack 表压力）
# 以下参数在 LXC 中可能受限，尽力设置
net.netfilter.nf_conntrack_tcp_timeout_established = 7200
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 15
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 15
net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 15
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 15
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60
net.netfilter.nf_conntrack_max = 16384

# === 安全加固 ===
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
